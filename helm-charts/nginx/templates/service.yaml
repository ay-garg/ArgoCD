apiVersion: v1
kind: Service
metadata:
  labels:
    app: {{ .Values.app.name }}
  name: {{ .Values.app.name }}
spec:
  ports:
  - name: {{ .Values.app.name }}
    port: {{ .Values.service.port }}
    protocol: TCP
    targetPort: {{ .Values.service.port}}
  selector:
    app: {{ .Values.app.name }}
  type: {{ .Values.service.type}}
status:
  loadBalancer: {}