apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: {{ .Values.app.name }}
  name: {{ .Values.app.name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.app.name }}
  strategy: {}
  template:
    metadata:
      labels:
        app: {{ .Values.app.name }}
    spec:
      containers:
      - image: "{{ .Values.image.repository }}@{{ .Values.image.digest}}"
        name: {{ .Values.app.name }}
        ports:
        - containerPort: {{ .Values.service.targetPort}}
        resources: {}
status: {}